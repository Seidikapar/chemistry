<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Химия Академиясы</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00c9a7;
            --secondary: #4facfe;
            --organic: #a8e6cf;
            --inorganic: #84d2f6;
            --dark: #2d3748;
            --light: #718096;
            --bg: #f7fafc;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #e8f5e9 50%, #fce4ec 100%);
            color: var(--dark);
            line-height: 1.6;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(0, 201, 167, 0.3), transparent);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        .particle:nth-child(1) { width: 80px; height: 80px; top: 10%; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 60px; height: 60px; top: 60%; left: 80%; animation-delay: 2s; }
        .particle:nth-child(3) { width: 100px; height: 100px; top: 80%; left: 20%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); opacity: 0.5; }
            50% { transform: translate(30px, -30px); opacity: 0.7; }
        }

        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
            z-index: 1;
        }

        .molecule {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
            animation: rotate 4s ease-in-out infinite;
            filter: drop-shadow(0 10px 30px rgba(0, 201, 167, 0.3));
        }

        @keyframes rotate {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
        }

        h1 {
            font-family: 'Comfortaa', cursive;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            background: linear-gradient(135deg, #00c9a7, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--light);
            max-width: 600px;
            margin: 0 auto 3rem;
            animation: fadeIn 1.5s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .buttons {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeIn 2s ease-out 0.6s both;
        }

        .btn {
            padding: 1.5rem 3rem;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s;
            font-family: 'Manrope', sans-serif;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 40px rgba(0, 201, 167, 0.3);
        }

        .btn-organic {
            background: linear-gradient(135deg, #a8e6cf, #7dd3c0);
            color: var(--dark);
        }

        .btn-inorganic {
            background: linear-gradient(135deg, #84d2f6, #5eb3e4);
            color: var(--dark);
        }

        .section {
            position: relative;
            min-height: 100vh;
            padding: 4rem 2rem;
            display: none;
            z-index: 1;
        }

        .section.active {
            display: block;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .back {
            position: fixed;
            top: 2rem;
            left: 2rem;
            padding: 1rem 2rem;
            background: var(--white);
            border: none;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 201, 167, 0.15);
            z-index: 100;
        }

        .back:hover {
            transform: translateX(-5px);
        }

        .header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .header h2 {
            font-family: 'Comfortaa', cursive;
            font-size: clamp(2rem, 6vw, 3.5rem);
            margin-bottom: 1rem;
        }

        .header p {
            font-size: 1.1rem;
            color: var(--light);
        }

        .topics {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            gap: 2rem;
        }

        .topic {
            background: var(--white);
            border-radius: 25px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0, 201, 167, 0.1);
            transition: all 0.4s;
            cursor: pointer;
        }

        .topic:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 201, 167, 0.2);
        }

        .topic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .topic-title {
            font-family: 'Comfortaa', cursive;
            font-size: 1.5rem;
            font-weight: 600;
            flex: 1;
        }

        .icon {
            font-size: 1.5rem;
            transition: transform 0.3s;
        }

        .topic.active .icon {
            transform: rotate(180deg);
        }

        .subtopics {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
        }

        .topic.active .subtopics {
            max-height: 5000px;
            margin-top: 2rem;
        }

        .subtopic {
            background: var(--bg);
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-radius: 15px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s;
        }

        .subtopic:hover {
            background: #e0f2fe;
            transform: translateX(5px);
        }

        .subtopic-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .content {
            display: none;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px dashed #cbd5e0;
        }

        .subtopic.open .content {
            display: block;
            animation: fadeIn 0.5s;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .tab {
            padding: 0.7rem 1.5rem;
            border: 2px solid var(--primary);
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab.active {
            background: var(--primary);
            color: var(--white);
        }

        .tab-content {
            display: none;
            padding: 1.5rem;
            background: var(--white);
            border-radius: 12px;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s;
        }

        .theory {
            line-height: 1.8;
            font-size: 1rem;
        }

        .video-wrap {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .video-wrap iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .exercises {
            padding: 1.5rem;
            background: #f0fdf4;
            border-radius: 12px;
            border: 2px solid #86efac;
        }

        .ex-title {
            font-weight: 600;
            margin-bottom: 1rem;
            color: #166534;
        }

        .ex-item {
            margin-bottom: 1rem;
            padding: 1rem;
            background: var(--white);
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .buttons {
                flex-direction: column;
                width: 100%;
            }
            .btn {
                width: 100%;
                max-width: 300px;
            }
            .back {
                top: 1rem;
                left: 1rem;
                padding: 0.7rem 1.2rem;
            }
        }
    </style>
</head>

        function show(sec) {
            document.getElementById('hero').style.display = 'none';
            document.getElementById('inorganic').classList.remove('active');
            document.getElementById('organic').classList.remove('active');
            document.getElementById(sec).classList.add('active');
            render(sec);
        }

        function showHero() {
            document.getElementById('hero').style.display = 'flex';
            document.getElementById('inorganic').classList.remove('active');
            document.getElementById('organic').classList.remove('active');
        }

        function render(sec) {
            const data = sec === 'organic' ? orgData : inorgData;
            const container = document.getElementById(sec === 'organic' ? 'org-topics' : 'inorg-topics');
            container.innerHTML = data.map((t, i) => `
                <div class="topic" onclick="toggleTopic(this)">
                    <div class="topic-header">
                        <div class="topic-title">${t.title}</div>
                        <div class="icon">▼</div>
                    </div>
                    <div class="subtopics">
                        ${t.subs.map((s, j) => `
                            <div class="subtopic" onclick="event.stopPropagation(); toggleSub(this)">
                                <div class="subtopic-title">📖 ${s.name}</div>
                                <div class="content">
                                    <div class="tabs">
                                        <button class="tab active" onclick="event.stopPropagation(); showT(this, 0)">Теория</button>
                                        <button class="tab" onclick="event.stopPropagation(); showT(this, 1)">Видео</button>
                                        <button class="tab" onclick="event.stopPropagation(); showT(this, 2)">Тапсырмалар</button>
                                    </div>
                                    <div class="tab-content active">
                                        <div class="theory">${s.theory}</div>
                                    </div>
                                    <div class="tab-content">
                                        <div class="video-wrap">
                                            <iframe src="${s.video}" frameborder="0" allowfullscreen></iframe>
                                        </div>
                                    </div>
                                    <div class="tab-content">
                                        <div class="exercises">
                                            <div class="ex-title">Тапсырмалар:</div>
                                            ${s.ex.map((e, k) => `<div class="ex-item">${k + 1}. ${e}</div>`).join('')}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleTopic(el) {
            el.classList.toggle('active');
        }

        function toggleSub(el) {
            el.classList.toggle('open');
        }

        function showT(btn, idx) {
            const parent = btn.closest('.content');
            parent.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            parent.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            parent.querySelectorAll('.tab-content')[idx].classList.add('active');
        }
    </script>
